<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>something just for you 🌸</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=DM+Sans:wght@300&display=swap" rel="stylesheet">
</head>

<body>

<!-- SCREEN 0 -->

<div class="screen active" id="s0">
  <div class="card">
    <h1 id="title"></h1>
    <p id="time"></p>
    <button id="startBtn">I'm ready</button>
  </div>
</div>

<!-- SCREEN 1 -->

<div class="screen" id="s1">
  <div class="card">
    <h2>What's on your mind?</h2>
    <textarea id="t1"></textarea>
    <div class="notice" id="notice1"></div>
    <button id="send1Btn">Send 💌</button>
  </div>
</div>

<!-- SCREEN 2 -->

<div class="screen" id="s2">
  <div class="card">
    <h2 id="resp1"></h2>
  </div>
</div>

<!-- SCREEN 3 -->

<div class="screen" id="s3">
  <div class="card">
    <h2>Tell me something you don’t usually say</h2>
    <textarea id="t2"></textarea>
    <button id="send2Btn">Send 🌷</button>
  </div>
</div>

<!-- SCREEN 4 -->

<div class="screen" id="s4">
  <div class="card">
    <h2 id="final"></h2>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
