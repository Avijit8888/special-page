<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>something just for you 🌸</title><style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #fff0f5, #fffaf0);
  color: #2a1a22;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  overflow: hidden;
}

/* screens */
.screen {
  display: none;
  padding: 20px;
}
.screen.active {
  display: block;
  animation: fade 0.6s ease;
}

@keyframes fade {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

/* button */
button {
  padding: 12px 28px;
  border-radius: 30px;
  border: none;
  background: #d4708a;
  color: white;
  font-size: 16px;
  cursor: pointer;
  margin-top: 20px;
}

/* textarea */
textarea {
  width: 90%;
  max-width: 400px;
  height: 120px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  margin-top: 15px;
  font-size: 15px;
}

/* typing */
.cursor {
  display: inline-block;
  width: 2px;
  background: #d4708a;
  animation: blink 1s infinite;
}
@keyframes blink {
  0%,100%{opacity:1;}
  50%{opacity:0;}
}
</style></head><body><!-- SCREEN 0 --><div class="screen active" id="s0">
  <h1 id="title"></h1>
  <p id="timeText"></p>
  <button onclick="go(1)">I'm ready →</button>
</div><!-- SCREEN 1 --><div class="screen" id="s1">
  <h2>What's on your mind?</h2>
  <textarea id="msg1" placeholder="write honestly..."></textarea><br>
  <button onclick="send1()">Send 💌</button>
</div><!-- SCREEN 2 --><div class="screen" id="s2">
  <h2 id="resp1"></h2>
</div><!-- SCREEN 3 --><div class="screen" id="s3">
  <h2>Tell me something you wouldn’t normally say</h2>
  <textarea id="msg2"></textarea><br>
  <button onclick="send2()">Send 🌷</button>
</div><!-- SCREEN 4 --><div class="screen" id="s4">
  <h2 id="final"></h2>
</div><script>

/* ERROR SAFE */
window.onerror = function(e){
  document.body.innerHTML = "<h2>Error loading page</h2>";
};

/* SCREEN NAV */
function go(n){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+n).classList.add("active");
}

/* TYPEWRITER */
function type(el, text, speed=40){
  el.innerHTML="";
  let i=0;
  function t(){
    if(i<text.length){
      el.innerHTML += text[i];
      i++;
      setTimeout(t, speed);
    }
  }
  t();
}

/* TIME PERSONALIZATION */
const now = new Date();
const hour = now.getHours();
let greeting = "Hey… I made something just for you 💌";

if(hour < 6) greeting = "You're still awake… I made this for you 💌";
else if(hour < 12) greeting = "Good morning… this is for you 🌸";
else if(hour < 18) greeting = "A quiet moment… just for you ✨";
else greeting = "Tonight feels different… I made this for you 🌙";

type(document.getElementById("title"), greeting);

document.getElementById("timeText").innerText =
"You opened this at " + now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

/* SEND 1 */
function send1(){
  const txt = document.getElementById("msg1").value.trim();
  if(!txt){
    alert("write something first 💌");
    return;
  }

  localStorage.setItem("lastMessage", txt);

  go(2);

  let resp = "I felt something real in what you wrote.";
  if(txt.length < 20){
    resp = "Short… but honest. I like that.";
  } else if(txt.length > 120){
    resp = "You opened up more than you think. That mattered.";
  }

  type(document.getElementById("resp1"), resp);

  setTimeout(()=>go(3), 2500);
}

/* SEND 2 */
function send2(){
  const txt = document.getElementById("msg2").value.trim();
  if(!txt){
    alert("say something 🌷");
    return;
  }

  go(4);

  let final = "Thank you for trusting this space.";
  if(txt.length > 60){
    final = "Not everyone says things like that. I’m glad you did.";
  }

  type(document.getElementById("final"), final + " 🌸");
}

/* MEMORY ILLUSION */
const last = localStorage.getItem("lastMessage");
if(last){
  setTimeout(()=>{
    document.getElementById("timeText").innerText =
    "You were here before… I remember.";
  }, 1500);
}

</script></body>
</html>
