<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>something just for you 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=DM+Sans:wght@300&display=swap" rel="stylesheet">

<style>
:root{
  --rose:#d4708a;
  --bg:#fffaf8;
}

body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:#2a1a22;
}

/* background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, #fdeef3, transparent),
    radial-gradient(circle at 80% 80%, #fde8d6, transparent),
    radial-gradient(circle at 50% 50%, #f0e8fd, transparent);
  z-index:-1;
}

/* layout */
.screen{
  display:none;
  min-height:100vh;
  padding:20px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.screen.active{display:flex}

/* card */
.card{
  width:100%;
  max-width:500px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(16px);
  border-radius:22px;
  padding:28px 20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* text */
h1,h2{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
}

p{
  font-size:14px;
  color:#8a5a6a;
}

/* input */
textarea{
  width:100%;
  min-height:120px;
  border-radius:12px;
  border:none;
  padding:12px;
  margin-top:10px;
  background:rgba(255,255,255,0.85);
  font-style:italic;
}

/* button */
button{
  margin-top:20px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:25px;
  background:linear-gradient(135deg,#f0a0b8,#d4708a);
  color:white;
}

/* notice */
.notice{
  font-size:13px;
  color:var(--rose);
  margin-top:6px;
}
</style>

</head>

<body>

<!-- SCREEN 0 -->

<div class="screen active" id="s0">
  <div class="card">
    <h1 id="title"></h1>
    <p id="time"></p>
    <button id="startBtn">I'm ready</button>
  </div>
</div>

<!-- SCREEN 1 -->

<div class="screen" id="s1">
  <div class="card">
    <h2>What's on your mind?</h2>
    <textarea id="t1"></textarea>
    <div class="notice" id="notice1"></div>
    <button id="send1Btn">Send 💌</button>
  </div>
</div>

<!-- SCREEN 2 -->

<div class="screen" id="s2">
  <div class="card">
    <h2 id="resp1"></h2>
  </div>
</div>

<!-- SCREEN 3 -->

<div class="screen" id="s3">
  <div class="card">
    <h2>Tell me something you don’t usually say</h2>
    <textarea id="t2"></textarea>
    <button id="send2Btn">Send 🌷</button>
  </div>
</div>

<!-- SCREEN 4 -->

<div class="screen" id="s4">
  <div class="card">
    <h2 id="final"></h2>
  </div>
</div>

<script>

/* safe DOM references */
const title = document.getElementById("title");
const time = document.getElementById("time");
const startBtn = document.getElementById("startBtn");

const t1 = document.getElementById("t1");
const notice1 = document.getElementById("notice1");
const send1Btn = document.getElementById("send1Btn");

const resp1 = document.getElementById("resp1");

const t2 = document.getElementById("t2");
const send2Btn = document.getElementById("send2Btn");

const final = document.getElementById("final");

/* navigation */
function go(n){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+n).classList.add("active");
}

/* typing effect */
function type(el,text){
  el.innerHTML="";
  let i=0;
  function t(){
    if(i<text.length){
      el.innerHTML+=text[i++];
      setTimeout(t,25);
    }
  }
  t();
}

/* greeting */
let h=new Date().getHours();
let g = h<6?"You're still awake… I was waiting."
      :h<12?"Good morning… I hoped you'd come."
      :h<18?"You chose this moment… interesting."
      :"Tonight feels quieter… now you're here.";

type(title,g);

time.innerText =
"You opened this at "+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

/* start button */
startBtn.addEventListener("click",()=>{
  go(1);
});

/* typing tracking */
let startTime;
let typing=false;

t1.addEventListener("input",()=>{
  if(!typing){
    typing=true;
    startTime=Date.now();
  }

  let len=t1.value.length;

  if(len===1) notice1.innerText="you started…";
  if(len===50) notice1.innerText="you're thinking carefully…";
});

/* send1 */
send1Btn.addEventListener("click",()=>{
  let txt=t1.value.trim();
  if(!txt){alert("write something");return;}

  let duration=(Date.now()-startTime)/1000;

  go(2);

  let r = duration>10
    ? "You took your time… that matters."
    : txt.length<20
    ? "Short… but honest."
    : "There’s something real in that.";

  type(resp1,r);

  setTimeout(()=>go(3),2000);
});

/* send2 */
send2Btn.addEventListener("click",()=>{
  let txt=t2.value.trim();
  if(!txt){alert("say something");return;}

  go(4);

  let r = txt.length>60
    ? "You don’t say things like that often… do you?"
    : "Even that small thing… meant more than you think.";

  type(final,r+" 🌸");
});

</script>

</body>
</html>
