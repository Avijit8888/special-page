<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>something just for you 🌸</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300&display=swap" rel="stylesheet"><style>
body {
  margin:0;
  font-family:'DM Sans',sans-serif;
  background: radial-gradient(circle at 20% 20%, #fdeef3, transparent),
              radial-gradient(circle at 80% 80%, #fde8d6, transparent),
              radial-gradient(circle at 50% 50%, #f0e8fd, transparent),
              #fffaf8;
  overflow:hidden;
  color:#2a1a22;
}

/* screens */
.screen{display:none;height:100vh;justify-content:center;align-items:center;padding:20px;}
.screen.active{display:flex;animation:fade .8s ease;}
@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1}}

/* card */
.card{
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(20px);
  padding:40px;
  border-radius:30px;
  max-width:520px;
  text-align:center;
}

/* typography */
h1,h2{font-family:'Cormorant Garamond',serif;font-weight:300}

/* textarea */
textarea{
  width:100%;
  height:120px;
  border:none;
  border-radius:15px;
  padding:15px;
  margin-top:10px;
  background:rgba(255,255,255,0.8);
}

/* button */
button{
  margin-top:20px;
  padding:12px 28px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#f0a0b8,#b8506e);
  color:white;
  font-size:16px;
}

/* notice */
.notice{
  font-size:13px;
  color:#b8506e;
  margin-top:10px;
  min-height:18px;
}
</style></head><body><!-- SCREEN 0 --><div class="screen active" id="s0">
  <div class="card">
    <h1 id="title"></h1>
    <p id="time"></p>
    <button id="startBtn">I'm ready →</button>
  </div>
</div><!-- SCREEN 1 --><div class="screen" id="s1">
  <div class="card">
    <h2>What's on your mind?</h2>
    <textarea id="t1"></textarea>
    <div class="notice" id="notice1"></div>
    <button id="send1Btn">Send 💌</button>
  </div>
</div><!-- SCREEN 2 --><div class="screen" id="s2">
  <div class="card">
    <h2 id="resp1"></h2>
  </div>
</div><!-- SCREEN 3 --><div class="screen" id="s3">
  <div class="card">
    <h2>Tell me something you don’t usually say</h2>
    <textarea id="t2"></textarea>
    <button id="send2Btn">Send 🌷</button>
  </div>
</div><!-- SCREEN 4 --><div class="screen" id="s4">
  <div class="card">
    <h2 id="final"></h2>
  </div>
</div><script>

/* SAFE START */
window.addEventListener("load", () => {

/* NAVIGATION */
function go(n){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+n).classList.add("active");
}

/* TYPE EFFECT */
function type(el,text){
  el.innerHTML="";
  let i=0;
  function t(){
    if(i<text.length){
      el.innerHTML+=text[i++];
      setTimeout(t,25+Math.random()*30);
    }
  }
  t();
}

/* GREETING */
let h=new Date().getHours();
let g = h<6?"You're still awake… I was waiting."
      :h<12?"Good morning… I hoped you'd come."
      :h<18?"You chose this moment… interesting."
      :"Tonight feels quieter… now you're here.";

type(document.getElementById("title"),g);

document.getElementById("time").innerText =
"You opened this at "+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

/* FIXED BUTTON (IMPORTANT) */
document.getElementById("startBtn").addEventListener("click",()=>{
  type(document.getElementById("title"),"Wait… don’t rush.");
  setTimeout(()=>go(1),800);
});

/* TRACKING */
let startTime;
let typingStarted=false;

/* INPUT */
document.getElementById("t1").addEventListener("input",()=>{
  if(!typingStarted){
    typingStarted=true;
    startTime=Date.now();
  }

  let len=t1.value.length;
  let n=document.getElementById("notice1");

  if(len===1) n.innerText="you started…";
  if(len===50) n.innerText="you're thinking carefully…";
});

/* SEND 1 */
document.getElementById("send1Btn").addEventListener("click",()=>{
  let txt=t1.value.trim();
  if(!txt){alert("write something");return;}

  let duration=Math.floor((Date.now()-startTime)/1000);

  go(2);

  let r = duration>10
    ? "You took your time… that means something."
    : txt.length<20
    ? "Short… but honest."
    : "There’s something real in that.";

  type(resp1,r);

  setTimeout(()=>go(3),2500);
});

/* SEND 2 */
document.getElementById("send2Btn").addEventListener("click",()=>{
  let txt=t2.value.trim();
  if(!txt){alert("say something");return;}

  go(4);

  let r = txt.length>60
    ? "You don’t say things like that often… do you?"
    : "Even that small thing… meant more than you think.";

  type(final,r+" 🌸");
});

});
</script></body>
</html>
