<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>something just for you 🌸</title><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300&display=swap" rel="stylesheet"><style>
body {
  margin:0;
  font-family:'DM Sans',sans-serif;
  background: radial-gradient(circle at 20% 20%, #fdeef3, transparent),
              radial-gradient(circle at 80% 80%, #fde8d6, transparent),
              #fffaf8;
  overflow:hidden;
}

/* glow background pulse */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle, rgba(212,112,138,0.15), transparent 70%);
  animation:pulse 6s infinite;
}
@keyframes pulse{
  0%,100%{opacity:0.2;}
  50%{opacity:0.5;}
}

/* screen */
.screen{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
}
.screen.active{display:flex}

/* card */
.card{
  background:rgba(255,255,255,0.65);
  backdrop-filter:blur(20px);
  padding:40px;
  border-radius:30px;
  text-align:center;
  max-width:500px;
}

/* text */
h1,h2{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
}

/* textarea */
textarea{
  width:100%;
  height:120px;
  border:none;
  border-radius:15px;
  padding:15px;
  margin-top:10px;
}

/* button */
button{
  margin-top:20px;
  padding:12px 28px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#f0a0b8,#b8506e);
  color:white;
}

/* subtle message */
.notice{
  font-size:13px;
  color:#b8506e;
  margin-top:10px;
  opacity:0.7;
}
</style></head><body><div class="screen active" id="s0">
  <div class="card">
    <h1 id="title"></h1>
    <p id="time"></p>
    <button onclick="go(1)">I'm ready →</button>
  </div>
</div><div class="screen" id="s1">
  <div class="card">
    <h2>What's on your mind?</h2>
    <textarea id="t1"></textarea>
    <div class="notice" id="notice1"></div>
    <button onclick="send1()">Send 💌</button>
  </div>
</div><div class="screen" id="s2">
  <div class="card">
    <h2 id="resp1"></h2>
  </div>
</div><div class="screen" id="s3">
  <div class="card">
    <h2>Tell me something you don’t usually say</h2>
    <textarea id="t2"></textarea>
    <button onclick="send2()">Send 🌷</button>
  </div>
</div><div class="screen" id="s4">
  <div class="card">
    <h2 id="final"></h2>
  </div>
</div><script>

/* navigation */
function go(n){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+n).classList.add("active");
}

/* typing effect */
function type(el,text){
  el.innerHTML="";
  let i=0;
  function t(){
    if(i<text.length){
      el.innerHTML+=text[i++];
      setTimeout(t,25+Math.random()*30);
    }
  }
  t();
}

/* time awareness */
let now=new Date();
type(title = document.getElementById("title"),
  "I wasn't sure if you'd come… but you did.");

document.getElementById("time").innerText =
"You opened this at "+now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

/* behavioral tracking */
let startTime;
let typingStarted=false;

document.getElementById("t1").addEventListener("input",()=>{
  if(!typingStarted){
    typingStarted=true;
    startTime=Date.now();
  }

  let len=document.getElementById("t1").value.length;
  let notice=document.getElementById("notice1");

  if(len===1) notice.innerText="you started…";
  if(len===40) notice.innerText="you're thinking carefully…";
  if(len===120) notice.innerText="this feels real.";
});

/* pause detection */
let pauseTimer;
document.getElementById("t1").addEventListener("input",()=>{
  clearTimeout(pauseTimer);
  pauseTimer=setTimeout(()=>{
    document.getElementById("notice1").innerText="you paused… I noticed that.";
  },3000);
});

/* send1 */
function send1(){
  let txt=document.getElementById("t1").value.trim();
  if(!txt){alert("write something");return;}

  let duration=Math.floor((Date.now()-startTime)/1000);
  localStorage.setItem("memory",txt);

  go(2);

  let response;

  if(duration>10){
    response="You took your time… that usually means it's important.";
  } else if(txt.length<20){
    response="Short… like you were holding back.";
  } else {
    response="There’s something in that… I felt it.";
  }

  type(document.getElementById("resp1"),response);

  setTimeout(()=>go(3),2500);
}

/* send2 */
function send2(){
  let txt=document.getElementById("t2").value.trim();
  if(!txt){alert("say something");return;}

  go(4);

  let response =
    txt.length>60
    ? "You don’t say things like that often… do you?"
    : "Even that small thing… meant more than you think.";

  type(document.getElementById("final"),response+" 🌸");
}

/* return detection */
document.addEventListener("visibilitychange",()=>{
  if(!document.hidden){
    alert("You came back… I was still here.");
  }
});

/* memory illusion */
let mem=localStorage.getItem("memory");
if(mem){
  setTimeout(()=>{
    document.getElementById("time").innerText =
    "You’ve been here before… I remember something about you.";
  },2000);
}

</script></body>
</html>
